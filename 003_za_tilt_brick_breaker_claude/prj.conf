# This file contains selected Kconfig options for the application.

CONFIG_UART_CONSOLE=y
CONFIG_STDOUT_CONSOLE=y

# Display stack
CONFIG_SPI=y
CONFIG_MIPI_DBI=y
CONFIG_GC9X01X=y
CONFIG_DISPLAY=y

# Sensor stack
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_MPU6050=y

# Logging
CONFIG_LOG=y
CONFIG_APP_LOG_LEVEL_INF=y

# Heap
CONFIG_HEAP_MEM_POOL_SIZE=2048

# Main thread stack — needs room for display/sensor calls
CONFIG_MAIN_STACK_SIZE=4096
